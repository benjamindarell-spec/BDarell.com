document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ef=\"#about\"],nav a[href=\"#projects\"],nav a[href=\"#skills\"],nav a[href=\"#experience\"]{display:none !important;}\n    [style*=\"170px 1fr\"]{grid-template-columns:1fr !important;gap:4px !important;}\n    [style*=\"repeat(4,1fr)\"]{grid-template-columns:1fr !important;}\n    [style*=\"90px 40px\"],[style*=\"96px 40px\"],[style*=\"110px 40px\"]{padding-top:60px !important;padding-bottom:60px !important;}\n    .bd-pgrid{grid-template-columns:repeat(2,1fr) !important;gap:12px !important;}\n    .bd-grid-card{padding:16px !important;}\n    .bd-grid-card p{font-size:13px !important;}\n    [style*=\"gap:96px\"]{gap:52px !important;}\n    [style*=\"padding:20px 40px 96px\"]{padding-bottom:56px !important;}\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div class=\"bd-root\" data-theme=\"{{ theme }}\" style=\"--accent: {{ accent }}; background:var(--bg); color:var(--text); font-family:'Space Grotesk',system-ui,sans-serif; min-height:100vh; overflow-x:hidden; position:relative;\">\n\n  <!-- ambient glow -->\n  <div style=\"position:absolute; top:-220px; left:50%; transform:translateX(-50%); width:900px; height:600px; background:radial-gradient(ellipse at center, var(--accent,#4f74d1) 0%, transparent 62%); opacity:.10; pointer-events:none; filter:blur(20px);\"><\u002Fdiv>\n\n  <!-- NAV -->\n  <nav style=\"position:sticky; top:0; z-index:50; display:flex; align-items:center; justify-content:space-between; padding:18px 40px; backdrop-filter:blur(14px); background:rgba(var(--bgc),.55); border-bottom:1px solid rgba(var(--line),.07);\">\n    <a href=\"#top\" style=\"display:flex; align-items:center; gap:11px; text-decoration:none; color:var(--text);\">\n      <span style=\"width:30px; height:30px; border-radius:8px; background:var(--accent,#4f74d1); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:15px;\">B<\u002Fspan>\n      <span style=\"font-weight:600; font-size:15px; letter-spacing:-.01em;\">Benjamin Daréll<\u002Fspan>\n    <\u002Fa>\n    <div style=\"display:flex; align-items:center; gap:8px; font-family:'JetBrains Mono',monospace; font-size:12.5px;\">\n      <a href=\"#about\" style=\"color:var(--text3); text-decoration:none; padding:8px 12px; border-radius:8px;\" style-hover=\"color:var(--text); background:rgba(var(--line),.06);\">about<\u002Fa>\n      <a href=\"#projects\" style=\"color:var(--text3); text-decoration:none; padding:8px 12px; border-radius:8px;\" style-hover=\"color:var(--text); background:rgba(var(--line),.06);\">projects<\u002Fa>\n      <a href=\"#skills\" style=\"color:var(--text3); text-decoration:none; padding:8px 12px; border-radius:8px;\" style-hover=\"color:var(--text); background:rgba(var(--line),.06);\">skills<\u002Fa>\n      <a href=\"#experience\" style=\"color:var(--text3); text-decoration:none; padding:8px 12px; border-radius:8px;\" style-hover=\"color:var(--text); background:rgba(var(--line),.06);\">experience<\u002Fa>\n      <button onclick=\"{{ toggleTheme }}\" aria-label=\"Toggle light and dark mode\" title=\"Toggle theme\" style=\"display:flex; align-items:center; justify-content:center; width:36px; height:36px; border-radius:9px; border:1px solid rgba(var(--line),.16); background:transparent; color:var(--text); cursor:pointer; margin-left:4px; transition:background .2s, border-color .2s;\" style-hover=\"background:rgba(var(--line),.06); border-color:rgba(var(--line),.32);\">\n        <sc-if value=\"{{ isDark }}\">\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"4\"><\u002Fcircle><path d=\"M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41\"><\u002Fpath><\u002Fsvg>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ isLight }}\">\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z\"><\u002Fpath><\u002Fsvg>\n        <\u002Fsc-if>\n      <\u002Fbutton>\n      <a href=\"#contact\" style=\"margin-left:6px; color:#fff; background:var(--accent,#4f74d1); text-decoration:none; padding:9px 16px; border-radius:8px; font-weight:600;\" style-hover=\"filter:brightness(1.08);\">get in touch<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <!-- HERO -->\n  <header id=\"top\" style=\"max-width:1180px; margin:0 auto; padding:72px 40px 40px; display:grid; grid-template-columns:1.25fr .85fr; gap:56px; align-items:center;\">\n    <div data-reveal=\"\">\n      <div style=\"display:inline-flex; align-items:center; gap:9px; font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text3); border:1px solid rgba(var(--line),.14); padding:7px 13px; border-radius:99px; margin-bottom:30px;\">\n        <span style=\"width:7px; height:7px; border-radius:50%; background:var(--accent,#4f74d1); animation:bdPulse 2.4s ease-in-out infinite;\"><\u002Fspan>\n        Open to opportunities · Oslo, Norway\n      <\u002Fdiv>\n      <h1 style=\"font-size:clamp(44px,6vw,78px); line-height:.98; letter-spacing:-.035em; font-weight:600; margin-bottom:24px;\">\n        Finance that<br>runs <span style=\"color:var(--accent,#4f74d1);\">itself<\u002Fspan>.\n      <\u002Fh1>\n      <p style=\"font-size:19px; line-height:1.55; color:var(--text2); max-width:480px; margin-bottom:34px;\">\n        I'm Benjamin Daréll - a Business Controller who automates the manual work. I turn data into decisions and repetitive tasks into systems that run on their own, so teams spend less time in spreadsheets and more time deciding.\n      <\u002Fp>\n      <div style=\"display:flex; gap:13px; flex-wrap:wrap;\">\n        <a href=\"#projects\" style=\"display:inline-flex; align-items:center; gap:9px; background:var(--accent,#4f74d1); color:#fff; text-decoration:none; padding:14px 24px; border-radius:11px; font-weight:600; font-size:15px;\" style-hover=\"filter:brightness(1.08); transform:translateY(-2px);\">\n          See my work <span style=\"font-family:'JetBrains Mono',monospace;\">→<\u002Fspan>\n        <\u002Fa>\n        <a href=\"#contact\" style=\"display:inline-flex; align-items:center; background:transparent; color:var(--text); text-decoration:none; padding:14px 24px; border-radius:11px; font-weight:500; font-size:15px; border:1px solid rgba(var(--line),.18);\" style-hover=\"background:rgba(var(--line),.06); border-color:rgba(var(--line),.3);\">\n          Get in touch\n        <\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div data-reveal=\"\" style=\"position:relative;\">\n      <div style=\"position:absolute; inset:-1px; border-radius:20px; background:linear-gradient(150deg, var(--accent,#4f74d1), transparent 55%); opacity:.5;\"><\u002Fdiv>\n      <div style=\"position:relative; border-radius:19px; overflow:hidden; border:1px solid rgba(var(--line),.1); aspect-ratio:4/5; background:var(--photo);\">\n        <img src=\"a2ac7564-6626-43e7-83ec-e8b7694b130f\" alt=\"Benjamin Daréll\" style=\"width:100%; height:100%; object-fit:cover; display:block;\">\n        <div style=\"position:absolute; bottom:0; left:0; right:0; padding:20px; background:linear-gradient(transparent, rgba(var(--bgc),.85)); display:flex; justify-content:space-between; align-items:flex-end; font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--text2);\">\n          <span>BUSINESS CONTROLLER<\u002Fspan><span style=\"color:var(--accent,#4f74d1);\">EST. NHH<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- LOGO MARQUEE -->\n  <section style=\"padding:36px 0 64px; border-top:1px solid rgba(var(--line),.06); border-bottom:1px solid rgba(var(--line),.06); margin-top:30px;\">\n    <p style=\"text-align:center; font-family:'JetBrains Mono',monospace; font-size:11.5px; letter-spacing:.18em; color:var(--text4); margin-bottom:26px;\">EXPERIENCE FROM<\u002Fp>\n    <div style=\"overflow:hidden; -webkit-mask-image:linear-gradient(90deg,transparent,#000 12%,#000 88%,transparent); mask-image:linear-gradient(90deg,transparent,#000 12%,#000 88%,transparent);\">\n      <div style=\"display:flex; gap:64px; width:max-content; animation:bdMarquee 128s linear infinite;\">\n        <sc-for list=\"{{ logosLoop }}\" as=\"logo\" hint-placeholder-count=\"12\">\n          <span style=\"font-size:21px; font-weight:600; letter-spacing:-.01em; color:var(--text2); white-space:nowrap; opacity:.55;\">{{ logo.name }}<\u002Fspan>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ABOUT -->\n  <section id=\"about\" style=\"max-width:1180px; margin:0 auto; padding:96px 40px;\">\n    <div data-reveal=\"\" style=\"display:grid; grid-template-columns:.7fr 1.3fr; gap:56px;\">\n      <div>\n        <p style=\"font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:.16em; color:var(--accent,#4f74d1); margin-bottom:16px;\">01 / ABOUT<\u002Fp>\n        <h2 style=\"font-size:clamp(32px,3.6vw,46px); line-height:1.02; letter-spacing:-.03em; font-weight:600;\">Who I am<\u002Fh2>\n      <\u002Fdiv>\n      <div>\n        <p style=\"font-size:21px; line-height:1.55; color:var(--text); margin-bottom:22px; text-wrap:pretty;\">\n          I'm a Business Controller at Link Mobility, responsible for operational finance across the Nordic region. My work sits at the intersection of finance and technology - I build models and tools that reduce manual workload, surface hidden value, and help teams make faster, better-informed decisions.\n        <\u002Fp>\n        <p style=\"font-size:16px; line-height:1.65; color:var(--text3); margin-bottom:36px; text-wrap:pretty;\">\n          Educated at the Norwegian School of Economics (NHH) and part of the CEMS network, with an exchange semester at IIM Calcutta. Outside of work I'm a founder, an active sportsman (bouldering, climbing, badminton), and a language enthusiast with a passion for travel and international environments.\n        <\u002Fp>\n        <div style=\"display:flex; gap:40px; flex-wrap:wrap; border-top:1px solid rgba(var(--line),.1); padding-top:28px;\">\n          <sc-for list=\"{{ stats }}\" as=\"s\" hint-placeholder-count=\"3\">\n            <div>\n              <div style=\"font-size:34px; font-weight:600; letter-spacing:-.02em; color:var(--text);\">{{ s.value }}<\u002Fdiv>\n              <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text4); margin-top:4px;\">{{ s.label }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PROJECTS -->\n  <section id=\"projects\" style=\"max-width:1180px; margin:0 auto; padding:40px 40px 96px;\">\n    <div data-reveal=\"\" style=\"display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:44px; gap:24px; flex-wrap:wrap;\">\n      <div>\n        <p style=\"font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:.16em; color:var(--accent,#4f74d1); margin-bottom:16px;\">02 / SELECTED WORK<\u002Fp>\n        <h2 style=\"font-size:clamp(32px,3.6vw,46px); line-height:1.02; letter-spacing:-.03em; font-weight:600;\">Projects &amp; products<\u002Fh2>\n      <\u002Fdiv>\n      <p style=\"font-size:15px; color:var(--text3); max-width:320px; line-height:1.5;\">Shipped software and financial systems - built end to end.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- FEATURED -->\n    <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:24px; margin-bottom:24px;\">\n      <sc-for list=\"{{ featured }}\" as=\"p\" hint-placeholder-count=\"3\">\n        <div data-reveal=\"\" class=\"bd-featured\" style=\"display:flex; flex-direction:column; border:1px solid rgba(var(--line),.1); border-radius:18px; overflow:hidden; background:var(--card);\">\n          <div style=\"position:relative; aspect-ratio:16/9; overflow:hidden;\">\n            <image-slot class=\"bd-shot\" id=\"{{ p.slotId }}\" fit=\"cover\" shape=\"rect\" src=\"{{ p.shotSrc }}\" placeholder=\"{{ p.shot }}\" style=\"width:100%; height:100%; display:block;\"><\u002Fimage-slot>\n            <span style=\"position:absolute; top:14px; left:14px; z-index:2; pointer-events:none; font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:.1em; color:#fff; background:var(--accent,#4f74d1); padding:5px 9px; border-radius:6px; font-weight:600;\">{{ p.badge }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"padding:26px 26px 28px;\">\n            <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; gap:12px;\">\n              <h3 class=\"bd-title\" style=\"font-size:25px; font-weight:600; letter-spacing:-.02em;\">{{ p.name }}<\u002Fh3>\n            <\u002Fdiv>\n            <p style=\"font-size:15px; line-height:1.6; color:var(--text2); margin-bottom:20px;\">{{ p.desc }}<\u002Fp>\n            <div style=\"display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;\">\n              <div style=\"display:flex; gap:8px; flex-wrap:wrap;\">\n                <sc-for list=\"{{ p.tags }}\" as=\"t\" hint-placeholder-count=\"3\">\n                  <span style=\"font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--text2); border:1px solid rgba(var(--line),.2); padding:5px 11px; border-radius:99px;\">{{ t }}<\u002Fspan>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <a href=\"{{ p.link }}\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex; align-items:center; gap:7px; font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--accent,#4f74d1); text-decoration:none; white-space:nowrap; font-weight:500;\">\n                <sc-if value=\"{{ p.link }}\">\n                  Visit <span class=\"bd-arrow\">→<\u002Fspan>\n                <\u002Fsc-if>\n              <\u002Fa>\n              <sc-if value=\"{{ p.internal }}\">\n                <span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text4); white-space:nowrap;\">Internal tool<\u002Fspan>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- GRID -->\n    <div class=\"bd-pgrid\" style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:24px;\">\n      <sc-for list=\"{{ projects }}\" as=\"p\" hint-placeholder-count=\"6\">\n        <div data-reveal=\"\" class=\"bd-grid-card\" style=\"border:1px solid rgba(var(--line),.1); border-radius:16px; padding:26px; background:var(--card); display:flex; flex-direction:column;\" style-hover=\"border-color:rgba(var(--line),.26); background:var(--card);\">\n          <span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--accent,#4f74d1); margin-bottom:16px;\">{{ p.no }}<\u002Fspan>\n          <h3 class=\"bd-title\" style=\"font-size:19px; font-weight:600; letter-spacing:-.01em; margin-bottom:11px; line-height:1.2;\">{{ p.title }}<\u002Fh3>\n          <p style=\"font-size:14.5px; line-height:1.6; color:var(--text2); margin-bottom:18px; flex:1;\">{{ p.desc }}<\u002Fp>\n          <div style=\"display:flex; gap:8px; flex-wrap:wrap;\">\n            <sc-for list=\"{{ p.tags }}\" as=\"t\" hint-placeholder-count=\"2\">\n              <span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text3); border:1px solid rgba(var(--line),.18); padding:4px 10px; border-radius:99px;\">{{ t }}<\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CASE STUDIES -->\n  <section id=\"casestudies\" style=\"border-top:1px solid rgba(var(--line),.06); background:var(--bg2);\">\n    <div style=\"max-width:1180px; margin:0 auto; padding:90px 40px 30px;\">\n      <div data-reveal=\"\" style=\"max-width:640px;\">\n        <p style=\"font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:.16em; color:var(--accent,#4f74d1); margin-bottom:16px;\">IN DETAIL<\u002Fp>\n        <h2 style=\"font-size:clamp(32px,3.6vw,46px); line-height:1.02; letter-spacing:-.03em; font-weight:600; margin-bottom:14px;\">A closer look<\u002Fh2>\n        <p style=\"font-size:16px; line-height:1.55; color:var(--text3);\">A closer look at a few tools built under Investica. This is just a snapshot — programmes developed specifically for internal work purposes aren't shown here.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- sticky tab strip -->\n    <div data-cs-strip=\"\" style=\"position:sticky; top:63px; z-index:20; background:var(--bg2); border-bottom:1px solid rgba(var(--line),.1);\">\n      <div style=\"max-width:1180px; margin:0 auto; padding:0 40px;\">\n        <div style=\"display:flex; gap:0; overflow-x:auto;\">\n          <sc-for list=\"{{ caseTabs }}\" as=\"c\" hint-placeholder-count=\"3\">\n            <button onclick=\"{{ c.onClick }}\" style=\"{{ c.tabStyle }}\">\n              <span style=\"font-weight:600;\">{{ c.code }}<\u002Fspan>\n              <span style=\"color:var(--text3); font-size:12px;\">{{ c.meta }}<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- panels -->\n    <div style=\"max-width:1180px; margin:0 auto; padding:20px 40px 96px;\">\n      <div style=\"display:flex; flex-direction:column; gap:96px;\">\n        <sc-for list=\"{{ caseStudies }}\" as=\"c\" hint-placeholder-count=\"3\">\n          <div data-cs-panel=\"\" id=\"cs-panel-{{ c.idx }}\" data-reveal=\"\" style=\"scroll-margin-top:140px; display:grid; grid-template-columns:1fr 1fr; gap:52px; align-items:center;\">\n            <div>\n              <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:18px;\">\n                <span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#fff; background:var(--accent,#4f74d1); padding:5px 10px; border-radius:6px; font-weight:600;\">{{ c.code }}<\u002Fspan>\n                <span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text3);\">{{ c.meta }}<\u002Fspan>\n              <\u002Fdiv>\n              <h3 style=\"font-size:clamp(26px,3vw,36px); line-height:1.05; letter-spacing:-.025em; font-weight:600; margin-bottom:16px;\">{{ c.title }}<\u002Fh3>\n              <p style=\"font-family:'JetBrains Mono',monospace; font-size:11.5px; letter-spacing:.14em; color:var(--accent,#4f74d1); margin-bottom:10px;\">THE PROBLEM<\u002Fp>\n              <p style=\"font-size:16.5px; line-height:1.6; color:var(--text2); margin-bottom:26px; text-wrap:pretty;\">{{ c.problem }}<\u002Fp>\n              <p style=\"font-family:'JetBrains Mono',monospace; font-size:11.5px; letter-spacing:.14em; color:var(--accent,#4f74d1); margin-bottom:14px;\">WHAT IT DOES<\u002Fp>\n              <ul style=\"list-style:none; display:flex; flex-direction:column; gap:11px; margin-bottom:28px;\">\n                <sc-for list=\"{{ c.features }}\" as=\"f\" hint-placeholder-count=\"4\">\n                  <li style=\"display:flex; gap:12px; align-items:flex-start; font-size:15px; line-height:1.5; color:var(--text2);\">\n                    <span style=\"color:var(--accent,#4f74d1); flex-shrink:0; margin-top:2px;\">→<\u002Fspan>\n                    <span>{{ f }}<\u002Fspan>\n                  <\u002Fli>\n                <\u002Fsc-for>\n              <\u002Ful>\n              <a href=\"{{ c.link }}\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex; align-items:center; gap:8px; font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--accent,#4f74d1); text-decoration:none; font-weight:500;\" style-hover=\"text-decoration:underline;\">\n                Visit {{ c.host }} <span>↗<\u002Fspan>\n              <\u002Fa>\n            <\u002Fdiv>\n            <div style=\"position:relative; border-radius:16px; overflow:hidden; border:1px solid rgba(var(--line),.12); background:var(--photo); aspect-ratio:16/10; box-shadow:var(--shadow);\">\n              <image-slot id=\"gal-{{ c.slotId }}\" fit=\"cover\" shape=\"rect\" src=\"{{ c.shotSrc }}\" placeholder=\"{{ c.title }} screenshot\" style=\"width:100%; height:100%; display:block;\"><\u002Fimage-slot>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SKILLS -->\n  <section id=\"skills\" style=\"border-top:1px solid rgba(var(--line),.06); background:var(--bg2);\">\n    <div style=\"max-width:1180px; margin:0 auto; padding:96px 40px;\">\n      <div data-reveal=\"\" style=\"margin-bottom:44px;\">\n        <p style=\"font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:.16em; color:var(--accent,#4f74d1); margin-bottom:16px;\">03 / EXPERTISE<\u002Fp>\n        <h2 style=\"font-size:clamp(32px,3.6vw,46px); line-height:1.02; letter-spacing:-.03em; font-weight:600;\">Skills &amp; tools<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:18px; margin-bottom:48px;\">\n        <sc-for list=\"{{ skills }}\" as=\"s\" hint-placeholder-count=\"8\">\n          <div data-reveal=\"\" style=\"border:1px solid rgba(var(--line),.09); border-radius:14px; padding:22px;\" style-hover=\"border-color:rgba(var(--line),.22);\">\n            <h3 style=\"font-size:16px; font-weight:600; margin-bottom:8px; letter-spacing:-.01em;\">{{ s.title }}<\u002Fh3>\n            <p style=\"font-size:13.5px; line-height:1.55; color:var(--text3);\">{{ s.desc }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div data-reveal=\"\" style=\"border-top:1px solid rgba(var(--line),.1); padding-top:30px;\">\n        <p style=\"font-family:'JetBrains Mono',monospace; font-size:11.5px; letter-spacing:.16em; color:var(--text4); margin-bottom:20px;\">LANGUAGES<\u002Fp>\n        <div style=\"display:flex; gap:14px; flex-wrap:wrap;\">\n          <sc-for list=\"{{ languages }}\" as=\"l\" hint-placeholder-count=\"5\">\n            <div style=\"display:flex; align-items:baseline; gap:10px; border:1px solid rgba(var(--line),.12); border-radius:11px; padding:13px 18px;\">\n              <span style=\"font-size:16px; font-weight:600;\">{{ l.name }}<\u002Fspan>\n              <span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--accent,#4f74d1);\">{{ l.level }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- EXPERIENCE -->\n  <section id=\"experience\" style=\"max-width:1180px; margin:0 auto; padding:96px 40px;\">\n    <div data-reveal=\"\" style=\"display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:20px; margin-bottom:44px;\">\n      <div>\n        <p style=\"font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:.16em; color:var(--accent,#4f74d1); margin-bottom:16px;\">04 / CAREER<\u002Fp>\n        <h2 style=\"font-size:clamp(32px,3.6vw,46px); line-height:1.02; letter-spacing:-.03em; font-weight:600;\">Experience &amp; education<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:6px; background:var(--card2); border:1px solid rgba(var(--line),.1); border-radius:12px; padding:5px;\">\n        <button onclick=\"{{ showWork }}\" style=\"{{ workBtnStyle }}\">Work<\u002Fbutton>\n        <button onclick=\"{{ showEdu }}\" style=\"{{ eduBtnStyle }}\">Education<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex; flex-direction:column;\">\n      <sc-for list=\"{{ timeline }}\" as=\"t\" hint-placeholder-count=\"6\">\n        <div style=\"display:grid; grid-template-columns:170px 1fr; gap:32px; padding:26px 0; border-top:1px solid rgba(var(--line),.09);\">\n          <div style=\"padding-top:3px;\">\n            <div style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; color:var(--text4);\">{{ t.date }}<\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--accent,#4f74d1); margin-top:8px;\">{{ t.org }}<\u002Fdiv>\n            <sc-if value=\"{{ t.badge }}\">\n              <div style=\"display:inline-flex; align-items:center; gap:6px; margin-top:12px; font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:.08em; color:var(--accent,#4f74d1); border:1px solid rgba(var(--line),.2); background:rgba(var(--line),.05); padding:5px 10px; border-radius:99px;\">★ {{ t.badge }}<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <div>\n            <h3 style=\"font-size:19px; font-weight:600; letter-spacing:-.01em; margin-bottom:8px;\">{{ t.role }}<\u002Fh3>\n            <p style=\"font-size:14.5px; line-height:1.6; color:var(--text2); max-width:680px;\">{{ t.desc }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CONTACT -->\n  <section id=\"contact\" style=\"border-top:1px solid rgba(var(--line),.06); background:var(--bg2);\">\n    <div style=\"max-width:1180px; margin:0 auto; padding:110px 40px 70px;\">\n      <div data-reveal=\"\" style=\"text-align:center; max-width:760px; margin:0 auto;\">\n        <p style=\"font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:.16em; color:var(--accent,#4f74d1); margin-bottom:22px;\">05 / CONTACT<\u002Fp>\n        <h2 style=\"font-size:clamp(38px,5.5vw,68px); line-height:1; letter-spacing:-.035em; font-weight:600; margin-bottom:24px;\">Let's build something.<\u002Fh2>\n        <p style=\"font-size:18px; line-height:1.55; color:var(--text2); margin-bottom:40px;\">Looking for a skilled Business Controller, or want to explore a collaboration? I'd love to hear from you.<\u002Fp>\n        <div style=\"display:flex; gap:13px; justify-content:center; flex-wrap:wrap;\">\n          <a href=\"mailto:hello@bdarell.com\" style=\"display:inline-flex; align-items:center; gap:9px; background:var(--accent,#4f74d1); color:#fff; text-decoration:none; padding:15px 26px; border-radius:11px; font-weight:600; font-size:15px;\" style-hover=\"filter:brightness(1.08); transform:translateY(-2px);\">hello@bdarell.com<\u002Fa>\n          <a href=\"https://www.linkedin.com/in/benjamindarell/\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex; align-items:center; background:transparent; color:var(--text); text-decoration:none; padding:15px 26px; border-radius:11px; font-weight:500; font-size:15px; border:1px solid rgba(var(--line),.18);\" style-hover=\"background:rgba(var(--line),.06);\">LinkedIn<\u002Fa>\n          <a href=\"tel:+4740331149\" style=\"display:inline-flex; align-items:center; background:transparent; color:var(--text); text-decoration:none; padding:15px 26px; border-radius:11px; font-weight:500; font-size:15px; border:1px solid rgba(var(--line),.18);\" style-hover=\"background:rgba(var(--line),.06);\">+47 403 31 149<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px; margin-top:90px; padding-top:28px; border-top:1px solid rgba(var(--line),.09); font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text4);\">\n        <span>© 2026 Benjamin Daréll<\u002Fspan>\n        <span>Business Controller · Oslo, Norway<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:900},&quot;theme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;dark&quot;,&quot;options&quot;:[&quot;dark&quot;,&quot;light&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Theme&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#4f74d1&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Theme&quot;,&quot;options&quot;:[&quot;#4f74d1&quot;,&quot;#2f8f83&quot;,&quot;#64748b&quot;,&quot;#b08a3e&quot;,&quot;#9b4a52&quot;]}}\">\nclass Component extends DCLogic {\n  state = { tab: 'work', activeCase: 0, userTheme: null };\n\n  renderVals() {\n    const accent = this.props.accent ?? '#4f74d1';\n    const theme = this.state.userTheme ?? this.props.theme ?? 'dark';\n    const shots = (typeof window !== 'undefined' && window.__SHOTS) ? window.__SHOTS : {};\n    const logos = [\n      { name:'Link Mobility', src:'https://logo.clearbit.com/linkmobility.com' },\n      { name:'EY', src:'https://logo.clearbit.com/ey.com' },\n      { name:'Nordea', src:'https://logo.clearbit.com/nordea.com' },\n      { name:'Worldline', src:'https://logo.clearbit.com/worldline.com' },\n      { name:'NHH', src:'https://logo.clearbit.com/nhh.no' },\n      { name:'Kjell & Co.', src:'https://logo.clearbit.com/kjell.com' },\n    ];\n\n    const featured = [\n      { name:'OmniLink Analytics', host:'internal · Link Mobility', badge:'PRICING MODEL', shot:'Drop an OmniLink Analytics screenshot', slotId:'shot-omnilink', internal:true,\n        defaultSrc:'uploads/omnilink-analytics.png',\n        desc:'An advanced pricing and scenario model built for Link Mobility - covering 240 destinations across four product categories, with real-time GP, margin, and volume scenario analysis.',\n        tags:['Excel','Power BI','SQL'],\n        link:'' },\n      { name:'SMS Price Comparison', host:'internal · Link Mobility', badge:'PRICE SCRAPER', shot:'Drop an SMS Price Comparison screenshot', slotId:'shot-smsprice', internal:true,\n        defaultSrc:'uploads/sms-price-comparison.png',\n        desc:'A real-time web scraper that pulls live competitor SMS pricing across 231 countries, benchmarking Link Mobility against the market to support pricing strategy.',\n        tags:['Python','VBA'],\n        link:'' },\n      { name:'Tick', host:'edge add-ons', badge:'BROWSER EXTENSION', shot:'Drop a Tick screenshot', slotId:'shot-tick',\n        desc:'A timer that links tracked hours to salary cost, revealing the true internal cost of every task through time-driven activity-based costing. Published on the Microsoft Edge Add-ons store.',\n        tags:['Extension','Time-driven ABC','Edge Store'],\n        link:'https://microsoftedge.microsoft.com/addons/detail/tick/noffbkpgkndfimndjeappedmnoofmonp' },\n      { name:'Offerlia', host:'offerlia.net', badge:'WEB PRODUCT', shot:'Drop an Offerlia screenshot', slotId:'shot-offerlia',\n        desc:'An AI-enabled HR tool for both applicants and recruiters, making the job application process easier and faster for both sides.',\n        tags:['AI','HR Tech','Full-stack'],\n        link:'https://offerlia.net/' },\n      { name:'OMXSPI Trader', host:'streamlit', badge:'DATA APP', shot:'Drop an OMXSPI Trader screenshot', slotId:'shot-omxspi',\n        desc:'A live trading dashboard for the OMXSPI index - real-time market data, signals, and analytics, built and deployed on Streamlit.',\n        tags:['Python','Streamlit','Markets'],\n        link:'https://omxspi-trader-kv6vruxr4lx4w5kho5ltiz.streamlit.app/' },\n      { name:'ESG holdings analysis', host:'Nordea Asset Management', badge:'ANALYSIS', shot:'Drop an ESG analysis screenshot', slotId:'shot-esg',\n        defaultSrc:'uploads/esg-analysis.png',\n        desc:'ESG and reputational risk analysis of holdings at Nordea Asset Management, informing a major corporate bond investment decision.',\n        tags:['ESG','Credit'],\n        link:'' },\n    ];\n    featured.forEach((f) => { f.shotSrc = shots[f.slotId] || f.defaultSrc || ''; });\n\n    const caseStudies = [\n      { code:'01', meta:'Edge Add-ons', title:'Tick', host:'edge add-ons',\n        link:'https://microsoftedge.microsoft.com/addons/detail/tick/noffbkpgkndfimndjeappedmnoofmonp',\n        slotId:'shot-tick',\n        problem:'Most teams have no idea what their internal tasks actually cost. Hours vanish into meetings, admin, and one-off requests with no link back to the salaries behind them — so the true price of work stays invisible.',\n        features:[\n          'One-click timer that tracks the time spent on any task',\n          'Links tracked hours to salary and hourly cost automatically',\n          'Applies time-driven activity-based costing per task, project, or client',\n          'Lives in the browser toolbar — nothing extra to open',\n          'Turns messy time into a clear internal cost breakdown',\n        ] },\n      { code:'02', meta:'offerlia.net', title:'Offerlia', host:'offerlia.net',\n        link:'https://offerlia.net/',\n        slotId:'shot-offerlia',\n        problem:'Hiring is slow and repetitive on both sides. Applicants rewrite the same details for every role, while recruiters wade through unstructured CVs trying to compare people fairly.',\n        features:[\n          'AI-enabled application flow that structures candidate information',\n          'Smart matching between applicants and open roles',\n          'Consistent, comparable data that speeds up recruiter screening',\n          'One profile that works across many applications for candidates',\n          'Built to cut friction for both applicants and recruiters',\n        ] },\n      { code:'03', meta:'Streamlit', title:'OMXSPI Trader', host:'streamlit',\n        link:'https://omxspi-trader-kv6vruxr4lx4w5kho5ltiz.streamlit.app/',\n        slotId:'shot-omxspi',\n        problem:'Following the Swedish OMXSPI index in real time usually means expensive terminals or scattered tools. Retail investors rarely get a clean, actionable view of the market in one place.',\n        features:[\n          'Live OMXSPI index data and market analytics',\n          'Trend indicators and signal generation',\n          'Interactive charts with historical views',\n          'Deployed as an accessible web app on Streamlit',\n          'Built end to end in Python',\n        ] },\n    ];\n    caseStudies.forEach((c, i) => { c.idx = i; c.shotSrc = shots[c.slotId] || ''; });\n\n    const tabBaseCs = \"display:flex; align-items:center; gap:9px; white-space:nowrap; background:transparent; border:none; border-bottom:2px solid transparent; padding:16px 18px; font-family:'JetBrains Mono',monospace; font-size:13px; cursor:pointer; transition:color .2s, border-color .2s;\";\n    const caseTabs = caseStudies.map((c, i) => ({\n      code: c.title, meta: c.meta,\n      onClick: () => this.goCase(i),\n      tabStyle: tabBaseCs + (i === this.state.activeCase\n        ? \"color:var(--text); border-bottom-color:var(--accent,\" + accent + \");\"\n        : \"color:var(--text3);\"),\n    }));\n\n    const projects = [\n      { no:'P.01', title:'Northern Europe incentive model', desc:'A full incentive framework for management and operations at Link Mobility, aligning KPIs with overhead strategy and motivating cross-functional teams.', tags:['Excel','Power BI'] },\n      { no:'P.02', title:'Commission automation', desc:'End-to-end commission calculation and reporting, eliminating manual errors and cutting processing time for monthly Nordic payouts.', tags:['Power BI','Excel'] },\n      { no:'P.03', title:'Investica AS - app studio', desc:'Founded during my NHH bachelor\\u2019s as a real estate investment venture, now an app studio shipping software and browser extensions across the App Store, Microsoft, and Chrome using AI-assisted development.', tags:['Founder','SaaS','AI-assisted'] },\n    ];\n\n    const skills = [\n      { title:'Financial controlling', desc:'Budgeting, forecasting, variance analysis, and monthly close.' },\n      { title:'Power BI', desc:'Interactive dashboards, automated reporting, and data modelling.' },\n      { title:'Excel & VBA', desc:'Advanced modelling, automation, and complex financial tools.' },\n      { title:'SQL & R', desc:'Data extraction, transformation, and analytical scripting.' },\n      { title:'ERP systems', desc:'SAP, Navision, Basware, Visma Enterprise and Visma Business.' },\n      { title:'Audit & IFRS', desc:'Payroll controls, OPEX testing, and Norwegian GAAP.' },\n      { title:'KPI & incentive design', desc:'Aligning performance metrics with business strategy.' },\n      { title:'ESG & credit analysis', desc:'Holdings assessment and corporate bond credit evaluation.' },\n    ];\n\n    const languages = [\n      { name:'Swedish', level:'native' },\n      { name:'Norwegian', level:'fluent' },\n      { name:'English', level:'C1' },\n      { name:'German', level:'B1' },\n      { name:'Japanese', level:'A2' },\n    ];\n\n    const work = [\n      { date:'Mar 2025 - present', role:'Business Controller', org:'Link Mobility', badge:'Hire of the Year 2025', desc:'Responsible for commercial finance across the Nordic region. Designed the Northern Europe incentive model and built automated Power BI / Excel tools for pricing, volume, and commissions.' },\n      { date:'Aug 2024 - Mar 2025', role:'Audit Associate', org:'EY', desc:'Payroll control processes for large public entities across seafood, shipping, and NGOs. Detailed OPEX and income account testing with cross-country collaboration.' },\n      { date:'Feb 2022 - present', role:'Founder', org:'Investica AS', desc:'Started during my NHH bachelor\\u2019s with a focus on real estate investment analysis and financial reporting across Sweden and Norway. Now an app studio building apps and browser extensions across platforms - App Store, Microsoft, and Chrome - using AI-assisted development. I handle everything from product development to shipping and iterating on live products.' },\n      { date:'Jun - Aug 2023', role:'Summer Analyst', org:'Nordea AM', desc:'ESG analysis of holdings and reputational risk assessments. Credit analysis of corporate bonds, contributing to a significant Australian bond investment decision.' },\n      { date:'Jun - Aug 2022', role:'Accounting & Consolidation Intern', org:'Worldline', desc:'Managed all payables for Bambora Device AB (200 MSEK revenue). Accruals, manual bookkeeping, and bank payment planning across France and Romania.' },\n      { date:'2015 - 2019', role:'Service Point & B2B Sales Manager', org:'Kjell & Co.', desc:'Contributed to the Norwegian expansion. Established 7 stores, achieved highest customer satisfaction among 121 stores in 2017, and grew B2B sales 30% in 2019.' },\n    ];\n\n    const education = [\n      { date:'2022 - 2024', role:'MSc Business Analysis & Performance Mgmt', org:'NHH', desc:'Norwegian School of Economics, Bergen, Norway.' },\n      { date:'2022 - 2024', role:'CEMS Master in International Management', org:'NHH', desc:'Prestigious double degree awarded jointly by the CEMS network of top global business schools.' },\n      { date:'2022', role:'CEMS MIM Exchange', org:'IIM Calcutta', desc:'Indian Institute of Management Calcutta, Kolkata, India.' },\n      { date:'2019 - 2022', role:'BSc Business & Administration', org:'NHH', desc:'Norwegian School of Economics, Bergen, Norway.' },\n    ];\n\n    const tabBase = \"font-family:'JetBrains Mono',monospace; font-size:13px; padding:9px 18px; border-radius:8px; border:none; cursor:pointer; transition:all .2s;\";\n    const on = tabBase + \"background:\" + accent + \"; color:#fff; font-weight:600;\";\n    const off = tabBase + \"background:transparent; color:var(--text3);\";\n\n    return {\n      accent, theme, caseStudies, caseTabs,\n      isDark: theme === 'dark', isLight: theme === 'light',\n      toggleTheme: () => {\n        const cur = this.state.userTheme ?? this.props.theme ?? 'dark';\n        const next = cur === 'dark' ? 'light' : 'dark';\n        try { localStorage.setItem('bd-theme', next); } catch (e) {}\n        this.setState({ userTheme: next });\n      },\n      logosLoop: (() => { const base = [...logos, ...logos, ...logos, ...logos]; return [...base, ...base]; })(),\n      featured, projects, skills, languages,\n      stats: [\n        { value:'5+', label:'years in finance' },\n        { value:'2', label:'products shipped' },\n        { value:'5', label:'languages spoken' },\n      ],\n      timeline: this.state.tab === 'work' ? work : education,\n      showWork: () => this.setState({ tab:'work' }),\n      showEdu: () => this.setState({ tab:'education' }),\n      workBtnStyle: this.state.tab === 'work' ? on : off,\n      eduBtnStyle: this.state.tab === 'education' ? on : off,\n    };\n  }\n\n  goCase(i) {\n    const doc = (this.el && this.el.ownerDocument) || document;\n    const panel = doc.getElementById('cs-panel-' + i);\n    if (!panel) return;\n    const scroller = doc.scrollingElement || doc.documentElement;\n    const y = panel.getBoundingClientRect().top + scroller.scrollTop - 128;\n    scroller.scrollTo({ top: y, behavior: 'smooth' });\n  }\n\n  componentDidMount() {\n    // Screenshot data (window.__SHOTS) can finish loading AFTER the first paint,\n    // especially in bundled/offline builds where script order differs. Re-render\n    // once it's available so every image-slot picks up its inlined source.\n    const reread = () => { try { this.forceUpdate(); } catch (e) {} };\n    if (typeof window !== 'undefined') {\n      if (!window.__SHOTS) window.addEventListener('load', reread, { once: true });\n      setTimeout(reread, 200);\n    }\n\n    // Restore the visitor's saved theme choice.\n    try {\n      const saved = localStorage.getItem('bd-theme');\n      if (saved === 'dark' || saved === 'light') this.setState({ userTheme: saved });\n    } catch (e) {}\n\n    // Scroll-spy for the case-study tab strip.\n    const spyRoot = this.el || document;\n    const spyDoc = (this.el && this.el.ownerDocument) || document;\n    this._caseSpy = () => {\n      const panels = [...spyRoot.querySelectorAll('[data-cs-panel]')];\n      if (!panels.length) return;\n      const strip = spyRoot.querySelector('[data-cs-strip]');\n      const refY = 63 + (strip ? strip.offsetHeight : 56) + 24;\n      let next = 0;\n      panels.forEach((el, i) => { if (el.getBoundingClientRect().top - refY <= 1) next = i; });\n      if (next !== this.state.activeCase) this.setState({ activeCase: next });\n    };\n    spyDoc.addEventListener('scroll', this._caseSpy, { passive: true, capture: true });\n    this._caseSpy();\n\n    // Elements are VISIBLE by default. The entrance animation is purely additive:\n    // when an element scrolls into view we play a fade-up keyframe. If the observer\n    // never fires (scaled/transformed container), the content simply stays visible.\n    const root = this.el || document;\n    const els = [...root.querySelectorAll('[data-reveal]')];\n    if (!els.length || !('IntersectionObserver' in window)) return;\n    const play = (el) => { el.style.animation = 'bdReveal .7s cubic-bezier(.16,1,.3,1) both'; };\n    const io = new IntersectionObserver((entries) => {\n      entries.forEach((e) => { if (e.isIntersecting) { play(e.target); io.unobserve(e.target); } });\n    }, { threshold: 0.08, rootMargin: '0px 0px -6% 0px' });\n    els.forEach((el) => io.observe(el));\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
